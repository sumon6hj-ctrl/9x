<!-- login.html - পাসওয়ার্ড হাইড করা -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.site_title }} - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff00;
            --secondary: #00cc00;
            --accent: #00ff80;
            --bg: #000000;
            --card-bg: #0a0a0a;
            --text: #00ff00;
            --danger: #ff0000;
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }
        
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }
        
        .matrix-column {
            position: absolute;
            top: -100%;
            color: var(--primary);
            font-size: 13px;
            line-height: 1.2;
            writing-mode: vertical-rl;
            text-orientation: upright;
            animation: matrix-fall linear infinite;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            transition: color 0.3s ease;
            letter-spacing: 2px;
        }
        
        @keyframes matrix-fall {
            from { transform: translateY(-100%); }
            to { transform: translateY(150vh); }
        }
        
        .login-container {
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 30px var(--primary);
            animation: pulse 3s infinite;
            transition: all 0.3s ease;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 20px var(--primary); }
            50% { box-shadow: 0 0 50px var(--primary); }
            100% { box-shadow: 0 0 20px var(--primary); }
        }
        
        .password-container {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }
        
        .login-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--primary);
            color: var(--text);
            padding: 12px 45px 12px 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }
        
        .login-input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 15px var(--secondary);
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            cursor: pointer;
            font-size: 18px;
            opacity: 0.7;
            transition: all 0.2s;
        }
        
        .toggle-password:hover {
            opacity: 1;
        }
        
        .login-button {
            width: 100%;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        .login-button:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 20px var(--primary);
        }
        
        .error-message {
            color: var(--danger);
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid var(--danger);
            padding: 10px;
            border-radius: 5px;
            background: rgba(255,0,0,0.1);
        }
        
        .terminal-line {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            color: var(--text);
            font-size: 14px;
        }
        
        .terminal-prompt {
            color: var(--primary);
            margin-right: 10px;
        }
        
        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: var(--primary);
            animation: blink 1s infinite;
            margin-left: 5px;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .login-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px var(--primary);
            margin: 0 auto 20px auto;
            display: block;
            transition: all 0.3s ease;
        }

        /* পাসওয়ার্ড হাইড - শুধু developer জানবে */
        .hidden-password-hint {
            display: none;
        }
    </style>
</head>
<body>
    <div class="matrix-bg" id="matrix"></div>
    
    <div class="login-container" id="loginContainer">
        <div class="text-center mb-8">
            <img src="https://i.ibb.co/gLrKJPXn" alt="Profile" c<img src="https://files.catbox.moe/n6vccm.jpg" alt="Profile" class="login-image" id="profileImage">lass="login-image" id="profileImage">
            
            <h1 class="text-3xl font-bold" id="titleText">{{ config.site_header }}</h1>
            <p class="text-xs mt-2" style="color: var(--secondary);" id="subText">SECURE TERMINAL v2.3</p>
        </div>
        
        <div class="terminal-line">
            <span class="terminal-prompt" id="promptText">$></span>
            <span>LOGIN_REQUIRED</span>
            <span class="cursor"></span>
        </div>
        
        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-triangle mr-2"></i>
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/login" id="loginForm">
            <div class="password-container">
                <input type="password" 
                       name="password" 
                       id="password"
                       class="login-input" 
                       placeholder="Enter Access Password"
                       required
                       autofocus>
                <i class="fas fa-eye toggle-password" onclick="togglePassword()" id="toggleIcon"></i>
            </div>
            
            <button type="submit" class="login-button" id="loginButton">
                <i class="fas fa-terminal mr-2"></i>
                AUTHENTICATE
            </button>
        </form>
        
        <!-- পাসওয়ার্ড হাইড - শুধু ডেভেলপার জানবে -->
        <div class="hidden-password-hint">
            <p>Admin: sumon000</p>
            <p>User: sumon9</p>
        </div>
        
        <div class="mt-6 text-center text-xs opacity-50">
            <p>⚠️ UNAUTHORIZED ACCESS PROHIBITED</p>
            <p class="mt-2">SUMON SECURE SYSTEMS</p>
        </div>
    </div>

    <script>
        // --- 30 টি রঙের লিস্ট ---
        const colors = [
            '#00ff00', '#00ccff', '#ff00ff', '#ff6600', '#ffff00',
            '#ff0066', '#66ff00', '#00ffff', '#ff3300', '#9933ff',
            '#00ff99', '#ff9933', '#3366ff', '#ff3399', '#66ff66',
            '#ffcc00', '#00ccff', '#ff6666', '#9966ff', '#ff9900',
            '#00ffcc', '#ff00cc', '#ccff00', '#ffcc66', '#66ffcc',
            '#ff3366', '#33ffcc', '#cc66ff', '#ffcc33', '#66ccff'
        ];

        let colorIndex = 0;

        function changeColors() {
            const color = colors[colorIndex];
            colorIndex = (colorIndex + 1) % colors.length;

            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--secondary', color);
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--text', color);
            
            const columns = document.querySelectorAll('.matrix-column');
            columns.forEach(col => {
                col.style.color = color;
                col.style.textShadow = `0 0 10px ${color}, 0 0 20px ${color}`;
            });
            
            // Update image border
            const img = document.getElementById('profileImage');
            if (img) {
                img.style.borderColor = color;
                img.style.boxShadow = `0 0 25px ${color}`;
            }
        }

        setInterval(changeColors, 1000);

        // --- ম্যাট্রিক্স তৈরি ---
        function createMatrix() {
            const matrix = document.getElementById('matrix');
            matrix.innerHTML = '';
            const columns = 50;
            const chars = '01アイウエオカキクケコサシスセソタチツテト';
            
            for (let i = 0; i < columns; i++) {
                const column = document.createElement('div');
                column.className = 'matrix-column';
                column.style.left = (i * (window.innerWidth / columns)) + 'px';
                column.style.animationDuration = (Math.random() * 4 + 2) + 's';
                column.style.animationDelay = (Math.random() * 6) + 's';
                column.style.opacity = Math.random() * 0.8 + 0.2;
                
                let text = '';
                const charCount = Math.floor(Math.random() * 10) + 25;
                for (let j = 0; j < charCount; j++) {
                    text += chars[Math.floor(Math.random() * chars.length)] + '<br>';
                }
                column.innerHTML = text;
                matrix.appendChild(column);
            }
        }
        createMatrix();
        
        window.addEventListener('resize', createMatrix);
        
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
