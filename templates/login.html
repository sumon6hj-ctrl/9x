<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUMON 9X — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    
    /* Premium Animated Background */
    .bg-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    
    .bg-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 25%, #0a1a0a 50%, #0a0a1a 75%, #0a0a0a 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease-in-out infinite alternate;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 0%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
      100% { background-position: 0% 0%; }
    }
    
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(0,255,65,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(0,255,65,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(0,255,65,0.03) 0%, transparent 40%),
        rgba(0,0,0,0.4);
      animation: pulseGlow 4s ease-in-out infinite alternate;
    }
    
    @keyframes pulseGlow {
      0% { opacity: 0.5; }
      100% { opacity: 0.8; }
    }
    
    /* Animated Grid Lines */
    .grid-lines {
      position: absolute;
      inset: 0;
      z-index: 1;
      background-image: 
        linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      perspective: 1000px;
    }
    
    @keyframes gridMove {
      0% { transform: translateY(0) rotateX(0deg); }
      100% { transform: translateY(60px) rotateX(2deg); }
    }
    
    /* Floating Particles with Colors */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }
    
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatParticle linear infinite;
      filter: blur(1px);
    }
    
    .particle:nth-child(1) { background: rgba(0,255,65,0.25); width: 3px; height: 3px; left: 10%; animation-duration: 18s; animation-delay: 0s; }
    .particle:nth-child(2) { background: rgba(0,255,65,0.2); width: 5px; height: 5px; left: 20%; animation-duration: 22s; animation-delay: 2s; }
    .particle:nth-child(3) { background: rgba(0,200,255,0.2); width: 4px; height: 4px; left: 30%; animation-duration: 16s; animation-delay: 4s; }
    .particle:nth-child(4) { background: rgba(255,200,0,0.15); width: 6px; height: 6px; left: 40%; animation-duration: 20s; animation-delay: 1s; }
    .particle:nth-child(5) { background: rgba(255,0,200,0.12); width: 4px; height: 4px; left: 50%; animation-duration: 19s; animation-delay: 3s; }
    .particle:nth-child(6) { background: rgba(0,255,65,0.2); width: 3px; height: 3px; left: 60%; animation-duration: 21s; animation-delay: 5s; }
    .particle:nth-child(7) { background: rgba(0,200,255,0.15); width: 5px; height: 5px; left: 70%; animation-duration: 17s; animation-delay: 2s; }
    .particle:nth-child(8) { background: rgba(255,100,0,0.12); width: 4px; height: 4px; left: 80%; animation-duration: 23s; animation-delay: 4s; }
    .particle:nth-child(9) { background: rgba(0,255,65,0.18); width: 3px; height: 3px; left: 90%; animation-duration: 15s; animation-delay: 1s; }
    .particle:nth-child(10) { background: rgba(100,255,200,0.12); width: 6px; height: 6px; left: 15%; animation-duration: 24s; animation-delay: 3s; }
    .particle:nth-child(11) { background: rgba(255,0,100,0.1); width: 4px; height: 4px; left: 45%; animation-duration: 18s; animation-delay: 5s; }
    .particle:nth-child(12) { background: rgba(0,255,65,0.15); width: 5px; height: 5px; left: 75%; animation-duration: 20s; animation-delay: 0s; }
    .particle:nth-child(13) { background: rgba(200,200,0,0.1); width: 3px; height: 3px; left: 5%; animation-duration: 19s; animation-delay: 2s; }
    .particle:nth-child(14) { background: rgba(200,0,200,0.08); width: 4px; height: 4px; left: 95%; animation-duration: 22s; animation-delay: 4s; }
    .particle:nth-child(15) { background: rgba(0,255,200,0.12); width: 5px; height: 5px; left: 35%; animation-duration: 16s; animation-delay: 1s; }
    
    @keyframes floatParticle {
      0% { transform: translateY(100vh) translateX(0) rotate(0deg) scale(0); opacity: 0; }
      10% { opacity: 1; transform: translateY(80vh) translateX(20px) rotate(60deg) scale(1); }
      50% { transform: translateY(40vh) translateX(-30px) rotate(180deg) scale(1.2); }
      90% { opacity: 1; transform: translateY(10vh) translateX(20px) rotate(300deg) scale(1); }
      100% { transform: translateY(-10vh) translateX(0) rotate(360deg) scale(0); opacity: 0; }
    }
    
    /* Scanning Line */
    .scan-line {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,255,65,0.008) 3px, rgba(0,255,65,0.008) 4px);
      animation: scanMove 10s linear infinite;
      pointer-events: none;
    }
    
    @keyframes scanMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 100vh; }
    }
    
    /* Glowing Ring Animation */
    .glow-ring {
      position: absolute;
      inset: -100px;
      z-index: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,65,0.03) 0%, transparent 70%);
      animation: ringPulse 6s ease-in-out infinite alternate;
      pointer-events: none;
    }
    
    @keyframes ringPulse {
      0% { transform: scale(0.8); opacity: 0.3; }
      100% { transform: scale(1.2); opacity: 0.6; }
    }
    
    .container{position:relative;z-index:10;width:100%;max-width:380px;padding:0 16px}
    
    .card {
      background: rgba(10,10,10,0.85);
      border: 2px solid rgba(0,255,65,0.3);
      border-radius: 12px;
      padding: 36px 32px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 
        0 0 40px rgba(0,255,65,0.08), 
        0 0 80px rgba(0,255,65,0.04), 
        inset 0 0 60px rgba(0,255,65,0.02),
        0 0 120px rgba(0,255,65,0.02);
      position: relative;
      overflow: hidden;
      animation: cardFadeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
      transition: border-color 0.5s ease, box-shadow 0.5s ease;
    }
    
    .card:hover {
      border-color: rgba(0,255,65,0.5);
      box-shadow: 
        0 0 60px rgba(0,255,65,0.12), 
        0 0 100px rgba(0,255,65,0.06), 
        inset 0 0 80px rgba(0,255,65,0.03),
        0 0 150px rgba(0,255,65,0.03);
    }
    
    @keyframes cardFadeIn {
      0% { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(8px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(
        from 0deg, 
        transparent, 
        rgba(0,255,65,0.04), 
        transparent, 
        rgba(0,255,65,0.04), 
        transparent,
        rgba(0,200,255,0.02),
        transparent,
        rgba(255,200,0,0.02),
        transparent
      );
      animation: rotateGlow 20s linear infinite;
      pointer-events: none;
    }
    
    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Animated Border Glow */
    .border-glow {
      position: absolute;
      inset: -3px;
      border-radius: 14px;
      z-index: -1;
      background: linear-gradient(135deg, #00ff41, #00ff88, #00ff41, #00ff88, #00ff41);
      background-size: 300% 300%;
      animation: borderGlow 4s ease-in-out infinite alternate;
      opacity: 0.15;
      filter: blur(1px);
    }
    
    @keyframes borderGlow {
      0% { background-position: 0% 50%; opacity: 0.1; }
      50% { background-position: 100% 50%; opacity: 0.25; }
      100% { background-position: 0% 50%; opacity: 0.1; }
    }
    
    /* Avatar Image with Glow */
    .avatar-wrapper {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 8px;
      z-index: 1;
    }
    
    .avatar-wrapper::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #00ff41, #00ff88, #00ff41, #00ff88, #00ff41);
      animation: avatarGlow 3s linear infinite;
      opacity: 0.3;
      filter: blur(8px);
    }
    
    .avatar-wrapper::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #00ff41, transparent, #00ff41, transparent, #00ff41);
      animation: avatarGlow 3s linear infinite reverse;
      opacity: 0.2;
    }
    
    @keyframes avatarGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(0,255,65,0.3);
      position: relative;
      z-index: 1;
      animation: avatarPulse 3s ease-in-out infinite;
      box-shadow: 0 0 30px rgba(0,255,65,0.1);
    }
    
    @keyframes avatarPulse {
      0%, 100% { transform: scale(1); border-color: rgba(0,255,65,0.3); box-shadow: 0 0 30px rgba(0,255,65,0.1); }
      50% { transform: scale(1.03); border-color: rgba(0,255,65,0.6); box-shadow: 0 0 50px rgba(0,255,65,0.2); }
    }
    
    .brand {
      text-align: center;
      font-size: 26px;
      font-weight: 900;
      color: #00ff41;
      letter-spacing: 5px;
      text-shadow: 
        0 0 20px rgba(0,255,65,0.3), 
        0 0 40px rgba(0,255,65,0.1),
        0 0 80px rgba(0,255,65,0.05);
      position: relative;
      z-index: 1;
      animation: textGlow 3s ease-in-out infinite alternate;
      background: linear-gradient(135deg, #00ff41, #00ff88, #00ff41);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: textGradient 4s ease-in-out infinite alternate;
    }
    
    @keyframes textGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .sub {
      text-align: center;
      font-size: 11px;
      color: rgba(0,255,65,0.5);
      letter-spacing: 4px;
      margin-top: 4px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
      animation: subPulse 3s ease-in-out infinite;
    }
    
    @keyframes subPulse {
      0%, 100% { opacity: 0.4; letter-spacing: 4px; }
      50% { opacity: 0.8; letter-spacing: 6px; }
    }
    
    .prompt {
      font-size: 13px;
      color: #00ff41;
      margin-bottom: 16px;
      opacity: 0.85;
      position: relative;
      z-index: 1;
      animation: promptBlink 2s ease-in-out infinite;
    }
    
    @keyframes promptBlink {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    
    .cursor {
      display: inline-block;
      width: 10px;
      height: 16px;
      background: #00ff41;
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 10px rgba(0,255,65,0.5);
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    .error-box {
      background: rgba(42,8,8,0.9);
      border: 1px solid #ef4444;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #f87171;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: shakeError 0.5s ease-in-out;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(8px);
      border-left: 4px solid #ef4444;
    }
    
    @keyframes shakeError {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    
    input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(13,13,13,0.8);
      border: 1px solid rgba(0,255,65,0.15);
      border-radius: 8px;
      color: #00ff41;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      z-index: 1;
    }
    
    input:hover {
      border-color: rgba(0,255,65,0.3);
      background: rgba(13,13,13,0.9);
    }
    
    input:focus {
      border-color: #00ff41;
      box-shadow: 0 0 30px rgba(0,255,65,0.08), inset 0 0 30px rgba(0,255,65,0.03);
      background: rgba(13,13,13,0.95);
      transform: translateY(-1px);
    }
    
    input::placeholder { 
      color: rgba(0,255,65,0.2);
      transition: color 0.3s ease;
    }
    
    input:focus::placeholder { color: rgba(0,255,65,0.1); }
    
    .pw-wrap {
      position: relative;
      margin-bottom: 20px;
      z-index: 1;
    }
    
    .pw-wrap input { margin-bottom: 0; padding-right: 44px; }
    
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(0,255,65,0.3);
      font-size: 16px;
      padding: 0;
      transition: all 0.3s ease;
      z-index: 2;
    }
    
    .eye-btn:hover { 
      color: #00ff41;
      transform: translateY(-50%) scale(1.1);
    }
    
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 2px solid #00ff41;
      border-radius: 8px;
      color: #00ff41;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      z-index: 1;
      overflow: hidden;
    }
    
    .auth-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,255,65,0.08), transparent);
      transition: left 0.6s ease;
    }
    
    .auth-btn:hover::before { left: 100%; }
    
    .auth-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,255,65,0.05), transparent 70%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    
    .auth-btn:hover::after { opacity: 1; }
    
    .auth-btn:hover {
      background: rgba(0,255,65,0.05);
      box-shadow: 
        0 0 40px rgba(0,255,65,0.15), 
        inset 0 0 40px rgba(0,255,65,0.03);
      transform: translateY(-2px);
      letter-spacing: 5px;
    }
    
    .auth-btn:active { 
      transform: translateY(0px) scale(0.98);
      box-shadow: 0 0 20px rgba(0,255,65,0.1);
    }
    
    .auth-btn.loading {
      opacity: 0.7;
      cursor: wait;
      transform: scale(0.98);
    }
    
    .admin-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 11px;
      color: rgba(251,191,36,0.3);
      text-decoration: none;
      transition: all 0.4s ease;
      position: relative;
      z-index: 1;
      letter-spacing: 1px;
    }
    
    .admin-link:hover {
      color: #fbbf24;
      text-shadow: 0 0 30px rgba(251,191,36,0.2);
      letter-spacing: 2px;
    }
    
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 10px;
      color: rgba(0,255,65,0.12);
      letter-spacing: 1px;
      line-height: 1.8;
      position: relative;
      z-index: 1;
      animation: footerPulse 4s ease-in-out infinite;
    }
    
    @keyframes footerPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }
    
    /* Loading spinner */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,255,65,0.1);
      border-top-color: #00ff41;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    
    .auth-btn.loading .spinner { display: inline-block; }
    .auth-btn.loading .btn-text { display: none; }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Responsive */
    @media (max-width: 420px) {
      .card { padding: 28px 20px; }
      .avatar { width: 70px; height: 70px; }
      .avatar-wrapper { width: 70px; height: 70px; }
      .brand { font-size: 20px; letter-spacing: 3px; }
    }
  </style>
</head>
<body>
  <div class="bg-container">
    <div class="bg-gradient"></div>
    <div class="bg-overlay"></div>
    <div class="grid-lines"></div>
    <div class="scan-line"></div>
    <div class="glow-ring"></div>
    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
  </div>
  
  <div class="container">
    <div class="card">
      <div class="border-glow"></div>
      <div class="avatar-wrapper">
        <img src="https://files.catbox.moe/n6vccm.jpg" alt="SUMON 9X" class="avatar">
      </div>
      <div class="brand">SUMON 9X</div>
      <div class="sub">⚡ SECURE TERMINAL v2.3 ⚡</div>
      <div class="prompt">$&gt; LOGIN_REQUIRED<span class="cursor"></span></div>
      {% if error %}
      <div class="error-box">▲ {{ error }}</div>
      {% endif %}
      <form method="POST" id="loginForm">
        <input type="text" name="username" placeholder="Username" required autocomplete="username" id="usernameInput">
        <div class="pw-wrap">
          <input type="password" name="password" placeholder="Password" id="pw" autocomplete="current-password">
          <button type="button" class="eye-btn" onclick="togglePw()">👁</button>
        </div>
        <button type="submit" class="auth-btn" id="authBtn">
          <span class="spinner"></span>
          <span class="btn-text">&gt;_ AUTHENTICATE</span>
        </button>
      </form>
      <a href="/admin/login" class="admin-link">⚙ Admin Panel</a>
      <div class="footer">⚠ UNAUTHORIZED ACCESS PROHIBITED<br>© SUMON SECURE SYSTEMS</div>
    </div>
  </div>
  
  <script>
    function togglePw() {
      const p = document.getElementById('pw');
      const btn = document.querySelector('.eye-btn');
      if (p.type === 'password') {
        p.type = 'text';
        btn.textContent = '🙈';
      } else {
        p.type = 'password';
        btn.textContent = '👁';
      }
    }
    
    // Smooth input focus effects
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'scale(1.002)';
      });
      input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'scale(1)';
      });
    });
    
    // Auto-focus username
    document.getElementById('usernameInput').focus();
    
    // Form submission with loading state
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      const btn = document.getElementById('authBtn');
      btn.classList.add('loading');
      
      // Add smooth fade effect
      setTimeout(() => {
        btn.style.opacity = '0.8';
      }, 100);
    });
    
    // Keyboard shortcut: Enter to submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const active = document.activeElement;
        if (active && (active.id === 'usernameInput' || active.id === 'pw')) {
          document.getElementById('loginForm').submit();
        }
      }
    });
    
    // Dynamic particle color change on hover
    document.querySelector('.card').addEventListener('mouseenter', function() {
      document.querySelectorAll('.particle').forEach((p, i) => {
        const colors = ['rgba(0,255,65,0.3)', 'rgba(0,200,255,0.2)', 'rgba(255,200,0,0.2)', 'rgba(255,0,200,0.15)'];
        p.style.background = colors[i % colors.length];
      });
    });
    
    document.querySelector('.card').addEventListener('mouseleave', function() {
      document.querySelectorAll('.particle').forEach((p, i) => {

        p.style.background = colors[i % colors.length];
