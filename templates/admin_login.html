<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | SUMON 9X VPS</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#080808;font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#0a0a0a;border:2px solid #fbbf24;border-radius:12px;padding:36px 32px;width:340px;box-shadow:0 0 32px #fbbf2422}
    .icon{font-size:40px;text-align:center;margin-bottom:12px}
    .title{text-align:center;font-size:16px;font-weight:700;color:#fbbf24;letter-spacing:2px;margin-bottom:4px;text-shadow:0 0 10px #fbbf24}
    .sub{text-align:center;font-size:11px;color:#6b7280;margin-bottom:24px}
    .error{background:#2a0808;border:1px solid #ef4444;border-radius:8px;padding:9px 12px;color:#f87171;font-size:12px;margin-bottom:14px}
    input{width:100%;padding:10px 12px;background:#111;border:1px solid #fbbf2455;border-radius:8px;color:#fbbf24;font-family:inherit;font-size:14px;outline:none;margin-bottom:14px}
    input:focus{border-color:#fbbf24}
    input::placeholder{color:#fbbf2444}
    .btn{width:100%;padding:11px;background:transparent;border:2px solid #fbbf24;border-radius:8px;color:#fbbf24;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .2s}
    .btn:hover{background:#fbbf2411;box-shadow:0 0 16px #fbbf2444}
    .back{display:block;text-align:center;margin-top:12px;font-size:11px;color:#4b5563;text-decoration:none;transition:color .2s}
    .back:hover{color:#9ca3af}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <div class="title">ADMIN ACCESS</div>
    <div class="sub">SUMON 9X VPS Control Panel</div>
    {% if error %}<div class="error">▲ {{ error }}</div>{% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="Admin password" required autofocus>
      <button type="submit" class="btn">&gt;_ ACCESS PANEL</button>
    </form>
    <a href="/login" class="back">← Back to Login</a>
  </div>
</body>
</html>
